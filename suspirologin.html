<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Suspiro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            /* Cores extraídas da imagem enviada */
            --bg-dark: #120c17;     /* Fundo bem escuro da página */
            --card-bg: #1e1626;     /* Cor dos cards da comunidade */
            --accent: #a370f7;      /* Roxo vibrante do botão 'Postar' */
            --input-bg: #2a1f35;    /* Fundo dos campos de texto */
            --text-gray: #b9bbbe;
            --header-pink: #d9a7c7; /* Tom rosado do topo do site original */
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .perfil-card {
            background: var(--card-bg);
            border-radius: 20px; /* Cantos mais arredondados como na foto */
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .header-perfil {
            background: linear-gradient(90deg, #5a3a7a, #3b2554); /* Gradiente sutil */
            padding: 25px;
            text-align: center;
            font-weight: 700;
            text-transform: none; /* Mantendo mais moderno */
            letter-spacing: 0.5px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .content-perfil {
            padding: 30px;
        }

        /* Estilização Baseada na Comunidade Suspiro */
        .form-label {
            color: #d1b3ff; /* Lilás claro para os rótulos */
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-control {
            background-color: var(--input-bg);
            border: 1px solid rgba(163, 112, 247, 0.2);
            color: white;
            border-radius: 12px;
            padding: 14px;
            transition: 0.3s;
        }

        .form-control::placeholder {
            color: #635475;
        }

        .form-control:focus {
            background-color: var(--input-bg);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(163, 112, 247, 0.15);
            outline: none;
        }

        .btn-enviar {
            background-color: var(--accent);
            border: none;
            width: 100%;
            padding: 14px;
            font-weight: bold;
            border-radius: 30px; /* Botão estilo pílula como o 'Postar' */
            transition: 0.4s ease;
            margin-top: 15px;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }

        .btn-enviar:hover {
            background-color: #bb8eff;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(163, 112, 247, 0.4);
        }

        #mensagem-sucesso {
            background: rgba(67, 181, 129, 0.15);
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px !important;
        }
    </style>
</head>
<body>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;"></iframe>

    <div class="perfil-card">
        <div class="header-perfil">Configurações de Perfil</div>
        
        <div class="content-perfil">
            <form action="https://script.google.com/macros/s/AKfycbxgqzFFJnJpre521UWK5RQMCedXDwGnjq2cW3vrrWHiBV_RxbtXjGtzXjXsAImvV9f7HQ/exec" 
                  method="POST" 
                  target="hidden_iframe" 
                  id="perfil-form">
                
                <div class="mb-4">
                    <label class="form-label">Nome de Usuário</label>
                    <input type="text" name="nome" class="form-control" placeholder="Seu apelido..." required>
                </div>

                <div class="mb-4">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Sobre Você (Bio)</label>
                    <textarea name="bio" class="form-control" rows="3" placeholder="Sua descrição literária..."></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-enviar" id="btn-submit">Salvar Perfil</button>
            </form>
            
            <div id="mensagem-sucesso" style="display:none; color: #73ffc1; text-align: center; margin-top: 15px; font-size: 14px;">
                Perfil salvo com sucesso! ✨
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('perfil-form');
        const btn = document.getElementById('btn-submit');
        const msg = document.getElementById('mensagem-sucesso');

        form.onsubmit = function() {
            btn.disabled = true;
            btn.innerText = "Enviando...";

            setTimeout(() => {
                msg.style.display = "block";
                btn.disabled = false;
                btn.innerText = "Salvar Perfil";
                
                setTimeout(() => { msg.style.display = "none"; }, 3000);
            }, 1000);
        };
    </script>

</body>
</html>
